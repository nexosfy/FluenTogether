<style>
:root{--bg:#0b0c10;--sf:#12131a;--cd:#191b24;--ac:#7c3aed;--acL:#a78bfa;--acS:rgba(124,58,237,.1);--gn:#10b981;--gnS:rgba(16,185,129,.1);--am:#f59e0b;--amS:rgba(245,158,11,.1);--rd:#ef4444;--rdS:rgba(239,68,68,.1);--tx:#e8eaed;--ts:#9ca3af;--td:#6b7280;--bd:#252736;--wh:#fff}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--tx);font-family:'Nunito',sans-serif;min-height:100vh}
#app{max-width:500px;margin:0 auto;padding:16px 16px 40px}h1,h2,h3{font-family:'Outfit',sans-serif}
.btn{border:none;border-radius:14px;cursor:pointer;font-family:'Nunito';font-weight:700;font-size:15px;padding:14px 24px;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;width:100%}
.bp{background:linear-gradient(135deg,var(--ac),#9333ea);color:var(--wh);box-shadow:0 4px 24px rgba(124,58,237,.25)}
.bg{background:transparent;color:var(--ts);border:1px solid var(--bd);font-size:14px;padding:10px 18px}
.bs{padding:6px 14px;font-size:13px;width:auto;border-radius:10px}
.cd{background:var(--cd);border:1px solid var(--bd);border-radius:16px;padding:20px}
input,textarea{width:100%;background:var(--sf);border:2px solid var(--bd);border-radius:12px;padding:14px;color:var(--tx);font-size:16px;font-family:'Nunito';outline:none}
input:focus,textarea:focus{border-color:var(--ac)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fx{display:flex;align-items:center;gap:8px}.fc{display:flex;flex-direction:column;gap:8px}.tc{text-align:center}
.lb{background:var(--acS);color:var(--acL);border:1px solid rgba(124,58,237,.3);border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;font-family:'Nunito';font-weight:700;display:inline-flex;align-items:center;gap:5px}
.lb:hover{background:rgba(124,58,237,.2)}.lbl{padding:10px 20px;font-size:15px}.lbs{background:var(--amS);color:var(--am);border-color:rgba(245,158,11,.3)}
.pb{height:6px;background:var(--sf);border-radius:3px;overflow:hidden;flex:1}.pbf{height:100%;border-radius:3px;transition:width .4s}
.vw{background:var(--acS);color:var(--acL);padding:2px 5px;border-radius:5px;cursor:pointer;border-bottom:2px solid var(--acL)}.va{background:var(--gnS);color:var(--gn);border-bottom-color:var(--gn)}
.xp-pop{position:fixed;top:80px;right:20px;background:var(--acS);border:1px solid rgba(124,58,237,.4);border-radius:12px;padding:8px 16px;color:var(--acL);font-weight:800;font-size:14px;animation:popUp 1.5s ease forwards;z-index:100;pointer-events:none}
.lvup{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:200;animation:fi .3s}
.ach{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--cd);border:1px solid rgba(245,158,11,.4);border-radius:16px;padding:14px 24px;display:flex;align-items:center;gap:12px;z-index:150;animation:sd 2.5s ease forwards;box-shadow:0 8px 32px rgba(0,0,0,.5)}
/* scramble */
.scr-word{display:inline-block;background:var(--cd);border:1px solid var(--bd);border-radius:10px;padding:8px 14px;margin:4px;cursor:pointer;font-weight:700;font-size:15px;transition:all .15s;user-select:none}
.scr-word:hover{background:var(--acS);border-color:var(--ac)}.scr-sel{background:var(--acS);border-color:var(--ac);color:var(--acL)}
.scr-slot{min-height:50px;background:var(--sf);border:2px dashed var(--bd);border-radius:12px;padding:8px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:4px}
/* mic */
.mic-btn{width:80px;height:80px;border-radius:50%;border:3px solid var(--ac);background:var(--acS);color:var(--acL);font-size:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mic-btn.recording{border-color:var(--rd);background:var(--rdS);animation:pulse 1s infinite}
@keyframes popUp{0%{opacity:0;transform:translateY(10px)}20%{opacity:1;transform:translateY(0)}80%{opacity:1}100%{opacity:0;transform:translateY(-20px)}}
@keyframes fi{from{opacity:0}to{opacity:1}}@keyframes si{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes sd{0%{opacity:0;transform:translate(-50%,-30px)}10%{opacity:1;transform:translate(-50%,0)}85%{opacity:1}100%{opacity:0;transform:translate(-50%,-30px)}}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
</style>
</head>

// ═══════ AUDIO ═══════
const say=(t,r=0.82)=>{if(!('speechSynthesis' in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=r;const v=speechSynthesis.getVoices();const e=v.find(x=>x.lang.startsWith('en'));if(e)u.voice=e;speechSynthesis.speak(u)};
const saySlow=t=>say(t,0.55);
if('speechSynthesis' in window){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();}

// ═══════ SPEECH RECOGNITION ═══════
let recognition=null;let isRecording=false;
function initSR(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return false;
  recognition=new SR();recognition.lang='en-US';recognition.continuous=false;recognition.interimResults=false;
  return true;
}
function startRec(cb){
  if(!recognition&&!initSR()){cb(null,'Seu navegador não suporta reconhecimento de voz');return;}
  recognition.onresult=e=>{const t=e.results[0][0].transcript;const c=e.results[0][0].confidence;cb(t,null,c);};
  recognition.onerror=e=>cb(null,e.error);
  recognition.onend=()=>{isRecording=false;render()};
  isRecording=true;recognition.start();render();
}

function getDailyPhrases(){
const lv=getLevel(S.xp).id;const li=lvI(lv);
const available=POTD.filter(p=>lvI(p.lv)<=li);
const seed=new Date().toDateString();let h=0;for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
const shuffled=[...available].sort((a,b)=>{const ha=((h*31+a.en.length)|0)%1000;const hb=((h*31+b.en.length)|0)%1000;return ha-hb;});
return shuffled.slice(0,3);
}

function getDailyPlan(){
const lv=getLevel(S.xp);const d=S.daily||{};
const steps=[];
if((d.cards||0)<5)steps.push({done:false,icon:'📚',text:'Revisar 5 flashcards',time:'~5 min',action:"go('topics')"});
else steps.push({done:true,icon:'✅',text:'Flashcards feitos!',time:'✓'});
if((d.dicts||0)<1)steps.push({done:false,icon:'🎧',text:'Fazer 1 ditado',time:'~5 min',action:"go('topics')"});
else steps.push({done:true,icon:'✅',text:'Ditado feito!',time:'✓'});
if((d.speaks||0)<3)steps.push({done:false,icon:'🎤',text:'Falar 3 frases',time:'~5 min',action:"go('topics')"});
else steps.push({done:true,icon:'✅',text:'Fala feita!',time:'✓'});
if((d.stories||0)<1)steps.push({done:false,icon:'📖',text:'Ler 1 história',time:'~5 min',action:"go('stories')"});
else steps.push({done:true,icon:'✅',text:'História lida!',time:'✓'});
if((d.chats||0)<3)steps.push({done:false,icon:'💬',text:'Chat IA (3+ msgs)',time:'~10 min',action:"startChat()"});
else steps.push({done:true,icon:'✅',text:'Chat feito!',time:'✓'});
if(!(d.immersionDone))steps.push({done:false,icon:'🎬',text:'Imersão: série/podcast/música',time:'30-60 min',action:"go('immersion')"});
else steps.push({done:true,icon:'✅',text:'Imersão feita!',time:'✓'});
if(!(d.phrasesDone))steps.push({done:false,icon:'💡',text:'Usar as 3 Frases do Dia entre vocês',time:'o dia todo',action:null});
else steps.push({done:true,icon:'✅',text:'Frases usadas!',time:'✓'});
return steps;
}

<div class="fx" style="margin-bottom:8px">${lb(par.t,'lbl')} ${lb(par.t,'lbl lbs',true)}</div>
<div style="background:var(--sf);border-radius:8px;padding:6px 10px;margin-bottom:10px;font-size:11px;color:var(--td)">💡 Toque nas <span style="color:var(--acL)">palavras coloridas</span> para ouvir + Anki</div>
<div class="fx"><button class="btn bg" style="width:50px" ${S.stStep===0?'disabled style="opacity:.3"':''} onclick="S.stStep--;render()">←</button><button class="btn bp" style="flex:1" onclick="stNext()">${S.stStep<st.pars.length-1?'Próximo →':'Quiz 📝'}</button></div>`);
setTimeout(()=>say(par.t),400);
}
function stTap(l,t,o){say(o);if(!S.stV[l]){S.stV[l]=t;S.srs['sv_'+l.replace(/\s/g,'_')]={box:0,last:Date.now()};save();addXp(5,'Palavra!');}render();}
function stNext(){const st=STORIES.find(s=>s.id===S.stId);if(S.stStep<st.pars.length-1){S.stStep++;render();}else{S.stShowQ=true;S.storiesR++;S.daily.stories=(S.daily.stories||0)+1;save();addXp(40,'História!');render();}}

// ═══════ AI CHAT ═══════
function startChat(){const lv=getLevel(S.xp);if(!S.gemKey){go('settings');return;}S.chatMsgs=[{role:'assistant',text:`Hi ${S.name}! 😊 Your level: ${lv.id}. Talk to me!\n\n(Fale qualquer coisa em inglês!)`}];S.chatIn='';S.chatLd=false;go('aichat');}
function rChat(){
R(`<button class="btn bg bs" style="width:auto;margin-bottom:12px" onclick="go('home')">← Voltar</button>
<div style="background:var(--gnS);border-radius:10px;padding:8px 12px;margin-bottom:8px;font-size:11px;color:var(--gn)">🤖 Nível: <strong>${getLevel(S.xp).id}</strong></div>
<div id="cb" style="display:flex;flex-direction:column;gap:8px;margin-bottom:8px;max-height:400px;overflow-y:auto">
${S.chatMsgs.map(m=>`<div style="display:flex;justify-content:${m.role==='user'?'flex-end':'flex-start'}"><div style="max-width:85%;padding:10px 14px;background:${m.role==='user'?'var(--acS)':'var(--cd)'};border:1px solid ${m.role==='user'?'rgba(124,58,237,.2)':'var(--bd)'};border-radius:${m.role==='user'?'14px 4px 14px 14px':'4px 14px 14px 14px'};font-size:14px;line-height:1.6;white-space:pre-wrap">${m.text}</div></div>`).join('')}
${S.chatLd?'<div style="padding:6px;color:var(--td);font-size:12px">Typing...</div>':''}</div>
<div class="fx"><input id="ci" placeholder="Type in English..." style="flex:1" onkeydown="if(event.key==='Enter')sendChat()"><button class="btn bp" style="width:50px;padding:12px" onclick="sendChat()">↑</button></div>`);
setTimeout(()=>{const b=$('cb');if(b)b.scrollTop=b.scrollHeight;},100);
}
async function sendChat(){const inp=$('ci');if(!inp)return;const msg=inp.value.trim();if(!msg||S.chatLd)return;S.chatMsgs.push({role:'user',text:msg});S.chatLd=true;render();
const lv=getLevel(S.xp),wl={A1:'5-8',A2:'8-12',B1:'10-15',B2:'12-18',C1:'15-25',C2:'any'};
const hist=S.chatMsgs.slice(-10).map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.text}]}));
try{const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${S.gemKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system_instruction:{parts:[{text:`English partner for ${S.name} (Brazilian, ${lv.id}). ${wl[lv.id]||'10-15'} words/sentence. Correct mistakes gently. Reply English only. PT translation for hard words only. 2-4 sentences. Ask follow-ups.${lv.id>='C1'?' Use idioms.':''}`}]},contents:hist,generationConfig:{maxOutputTokens:300}})});
const d=await r.json();const reply=d.candidates?.[0]?.content?.parts?.[0]?.text||'Try again! 😊';
S.chatMsgs.push({role:'assistant',text:reply});S.chatCount++;S.daily.chats=(S.daily.chats||0)+1;save();addXp(8,'Chat!');}catch(e){S.chatMsgs.push({role:'assistant',text:'Erro! Verifique a API key em ⚙️'});}
S.chatLd=false;render();}

// ═══════ EXAM ═══════
function startExam(lv){S.eLv=lv;S.eIdx=0;S.eSc=0;S.fb=null;go('exam');}
function rExam(){const ex=EXAMS[S.eLv];if(!ex){go('home');return;}const lv=LEVELS.find(l=>l.id===S.eLv),nxt=LEVELS[lvI(S.eLv)+1];
if(S.eIdx>=ex.qs.length){const ok=S.eSc>=ex.pass;if(ok){if(!S.exPassed)S.exPassed=[];if(!S.exPassed.includes(S.eLv)){S.exPassed.push(S.eLv);save();addXp(100,'Prova!');}}
R(`<div class="tc" style="padding:32px"><div style="font-size:64px">${ok?'🎓':'📝'}</div><h2 style="color:${ok?'var(--gn)':'var(--rd)'}">${ok?'Aprovado!':'Não passou'}</h2><p style="color:var(--ts)">${S.eSc}/${ex.qs.length} (precisa ${ex.pass})</p>${ok&&nxt?`<p style="color:${nxt.color};font-weight:700;margin-top:8px">${nxt.emoji} ${nxt.id} desbloqueado!</p>`:''}<button class="btn bp" style="margin-top:16px" onclick="go('home')">${ok?'🎉 Continuar':'Voltar'}</button></div>`);return;}
const q=ex.qs[S.eIdx];
R(`<div class="fx" style="justify-content:space-between;margin-bottom:12px"><div style="font-size:13px;color:${lv.color};font-weight:700">🎓 Prova ${lv.id}</div><span style="font-size:12px;color:var(--td)">${S.eIdx+1}/${ex.qs.length}</span></div>
<div class="fx" style="margin-bottom:16px">${pb(S.eIdx,ex.qs.length,lv.color)}</div>
<div class="cd" style="margin-bottom:12px"><div style="font-size:16px;font-weight:700">${q.q}</div></div>
<div class="fc">${q.o.map((o,i)=>{const sel=S.fb===i,isC=i===q.c,sh=S.fb!==null;return`<button class="btn" style="background:${sh&&isC?'var(--gnS)':sh&&sel?'var(--rdS)':'var(--sf)'};color:var(--tx);border:2px solid ${sh&&isC?'var(--gn)':sh&&sel?'var(--rd)':'var(--bd)'};border-radius:12px;padding:12px;justify-content:flex-start;font-size:14px" ${sh?'disabled':''} onclick="S.fb=${i};if(${i}===${q.c})S.eSc++;render();setTimeout(()=>{S.eIdx++;S.fb=null;render()},1000)">${sh&&isC?'✅ ':''}${sh&&sel&&!isC?'❌ ':''}${o}</button>`;}).join('')}</div>`);}

// ═══════ ACHS ═══════
function rAchs(){R(`<button class="btn bg bs" style="width:auto;margin-bottom:14px" onclick="go('home')">← Voltar</button><h2 style="font-size:20px;margin-bottom:12px">🏆 Conquistas (${S.achs.length}/${ACHS.length})</h2><div class="g2">${ACHS.map(a=>{const u=S.achs.includes(a.id);return`<div class="cd tc" style="padding:14px;opacity:${u?1:.35};border-color:${u?'rgba(245,158,11,.3)':'var(--bd)'}"><div style="font-size:24px">${a.icon}</div><div style="font-size:12px;font-weight:700;margin-top:4px">${a.t}</div><div style="font-size:10px;color:var(--td)">${a.d}</div></div>`;}).join('')}</div>`);}

// ═══════ SETTINGS ═══════
function rSettings(){R(`<button class="btn bg bs" style="width:auto;margin-bottom:14px" onclick="go('home')">← Voltar</button><h2 style="font-size:20px;margin-bottom:16px">⚙️ Configurações</h2>
<div class="cd" style="margin-bottom:12px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">🤖 Google Gemini API Key</div><p style="font-size:11px;color:var(--td);margin-bottom:8px">aistudio.google.com → Get API Key (grátis)</p><input id="gk" type="password" value="${S.gemKey}" placeholder="Cole a key aqui"><button class="btn bp bs" style="margin-top:8px" onclick="S.gemKey=$('gk').value.trim();save();render()">Salvar</button>${S.gemKey?'<div style="font-size:11px;color:var(--gn);margin-top:4px">✅ Salva</div>':''}</div>
<div class="cd" style="margin-bottom:12px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">👤 Perfil</div><div style="font-size:13px;color:var(--ts)">Nome: <strong>${S.name}</strong><br>Nível: <strong>${getLevel(S.xp).id} — ${getLevel(S.xp).pt}</strong><br>XP: <strong>${S.xp}</strong><br>Streak: <strong>${S.streak} dias</strong><br>Cards: <strong>${S.rev}</strong><br>Histórias: <strong>${S.storiesR}</strong></div></div>
<div class="cd" style="margin-bottom:12px"><div style="font-size:13px;font-weight:700;margin-bottom:4px">🎓 Provas passadas</div><div style="font-size:12px;color:var(--ts)">${(S.exPassed||[]).length?S.exPassed.join(', '):'Nenhuma'}</div></div>
<div class="cd"><button class="btn bg bs" style="border-color:var(--rd);color:var(--rd)" onclick="if(confirm('Apagar TUDO?')){localStorage.removeItem('ft3');location.reload();}">⚠️ Resetar</button></div>`);}

// ═══════ MARK MANUAL TASKS ═══════
function markDone(text){
if(text.includes('Imersão')){S.daily.immersionDone=true;save();addXp(20,'Imersão!');}
if(text.includes('Frases')){S.daily.phrasesDone=true;save();addXp(15,'Frases!');}
render();
}

// ═══════ ROADMAP ═══════
function rRoadmap(){
const phases=getRoadmap();const lv=getLevel(S.xp).id;const li=lvI(lv);
R(`<button class="btn bg bs" style="width:auto;margin-bottom:14px" onclick="go('home')">← Voltar</button>
<h2 style="font-size:20px;margin-bottom:4px">🗺️ Roadmap: B2 em 2 Anos</h2>
<p style="color:var(--td);font-size:12px;margin-bottom:16px">Meta: conversar bem em qualquer situação</p>

<div style="background:var(--gnS);border:1px solid rgba(16,185,129,.2);border-radius:12px;padding:12px;margin-bottom:14px;font-size:12px;color:var(--gn);line-height:1.5">
<strong>⏱️ Tempo diário necessário: ~1h30</strong><br>
20 min no app + 10 min chat IA + 30-60 min imersão + usar 3 frases do dia
</div>

${phases.map((p,i)=>{
const isPast=lvI(p.lv.split('→')[0]||'Z')<li;
const isCurrent=p.active;
return`<div class="cd" style="margin-bottom:10px;padding:16px;border-color:${isCurrent?p.color+'55':'var(--bd)'};${isPast?'opacity:.5':''}">
<div class="fx" style="margin-bottom:6px">
<div style="width:28px;height:28px;border-radius:50%;background:${isCurrent?p.color:isPast?'var(--gn)':'var(--sf)'};display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--wh);font-weight:800;flex-shrink:0">${isPast?'✓':i+1}</div>
<div style="flex:1">
<div style="font-size:14px;font-weight:800;color:${isCurrent?p.color:'var(--tx)'}">${p.lv} ${isCurrent?'← VOCÊ ESTÁ AQUI':''}</div>
<div style="font-size:11px;color:var(--td)">${p.months}</div>
</div>
</div>
<div style="font-size:12px;font-weight:700;color:${p.color};margin-bottom:4px">Foco: ${p.focus}</div>
<div style="font-size:12px;color:var(--ts);line-height:1.5">${p.tasks}</div>
</div>`;
}).join('')}

<div class="cd" style="margin-bottom:10px;padding:16px;border-color:rgba(236,72,153,.3)">
<div class="fx" style="margin-bottom:6px">
<div style="width:28px;height:28px;border-radius:50%;background:var(--pk);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">🏆</div>
<div><div style="font-size:14px;font-weight:800;color:var(--pk)">B2 ALCANÇADO!</div><div style="font-size:11px;color:var(--td)">Meta final</div></div>
</div>
<div style="font-size:12px;color:var(--ts);line-height:1.5">Você consegue conversar naturalmente sobre qualquer assunto do cotidiano, entende séries sem legenda, expressa opiniões complexas e se vira em qualquer situação em inglês.</div>
</div>

<div style="background:var(--acS);border:1px solid rgba(124,58,237,.15);border-radius:12px;padding:12px;font-size:12px;color:var(--ts);line-height:1.6">
<strong>💡 Dica:</strong> O segredo não é estudar muito em um dia. É estudar <strong>TODO DIA</strong>, sem pular. 1h30 por dia, 365 dias por ano = mais de 500 horas de estudo. É o suficiente para B2.
</div>
`);
}

// ═══════ IMMERSION GUIDE ═══════
function rImmersion(){
const lv=getLevel(S.xp).id;const data=IMMERSION[lv]||IMMERSION.A1;
R(`<button class="btn bg bs" style="width:auto;margin-bottom:14px" onclick="go('home')">← Voltar</button>
<h2 style="font-size:20px;margin-bottom:4px">🎬 Guia de Imersão</h2>
<p style="color:var(--td);font-size:12px;margin-bottom:14px">Recomendações para seu nível: <strong style="color:${getLevel(S.xp).color}">${lv}</strong></p>

<div class="cd" style="margin-bottom:10px;border-color:var(--am)33;padding:14px">
<div style="font-size:12px;font-weight:700;color:var(--am);margin-bottom:6px">⚡ DICA IMPORTANTE</div>
<div style="font-size:13px;color:var(--ts);line-height:1.6">${data.tip}</div></div>

${data.podcast.map(s=>`<div style="font-size:13px;color:var(--ts);padding:4px 0;border-bottom:1px solid var(--bd)">• ${s}</div>`).join('')}</div>

<div class="cd" style="margin-bottom:10px;padding:14px">
<div style="font-size:12px;font-weight:700;color:#10b981;margin-bottom:8px">🎵 Música</div>
${data.music.map(s=>`<div style="font-size:13px;color:var(--ts);padding:4px 0;border-bottom:1px solid var(--bd)">• ${s}</div>`).join('')}</div>

<div class="cd" style="margin-bottom:10px;padding:14px">
<div style="font-size:12px;font-weight:700;color:#ec4899;margin-bottom:8px">📱 YouTube</div>
${data.youtube.map(s=>`<div style="font-size:13px;color:var(--ts);padding:4px 0;border-bottom:1px solid var(--bd)">• ${s}</div>`).join('')}</div>

<div style="background:var(--gnS);border:1px solid rgba(16,185,129,.2);border-radius:12px;padding:12px;font-size:12px;color:var(--gn);line-height:1.5">

// ═══════ DAILY PLAN (separate page) ═══════
function rDailyPlan(){
const steps=getDailyPlan();const done=steps.filter(s=>s.done).length;
R(`<button class="btn bg bs" style="width:auto;margin-bottom:14px" onclick="go('home')">← Voltar</button>
<h2 style="font-size:20px;margin-bottom:4px">📋 Plano do Dia</h2>
<p style="color:var(--td);font-size:12px;margin-bottom:14px">${done}/${steps.length} completos</p>
<div class="fx" style="margin-bottom:14px">${pb(done,steps.length,'var(--gn)')}<span style="font-size:11px;color:var(--td)">${Math.round(done/steps.length*100)}%</span></div>
<div class="fc">${steps.map(s=>`<div class="cd" style="padding:14px;cursor:${s.done?'default':'pointer'};opacity:${s.done?.6:1};border-color:${s.done?'var(--gn)33':'var(--bd)'}" ${!s.done&&s.action?`onclick="${s.action}"`:''}>
<div class="fx"><span style="font-size:20px">${s.icon}</span><span style="flex:1;font-size:14px;font-weight:700;${s.done?'text-decoration:line-through':''}">${s.text}</span>${!s.done?'<span style="color:var(--acL)">Ir →</span>':''}</div>
</div>`).join('')}</div>
<div style="margin-top:14px;background:var(--acS);border:1px solid rgba(124,58,237,.15);border-radius:12px;padding:12px;font-size:12px;color:var(--ts);line-height:1.5">

`);
}

load();render();
