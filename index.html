// ═══════ AUDIO (ResponsiveVoice - works everywhere!) ═══════
function say(t,r){
  if(!t)return;
  r=r||1;
  // Stop any current speech
  try{if(window.responsiveVoice)responsiveVoice.cancel();}catch(e){}
  try{if(window.speechSynthesis)speechSynthesis.cancel();}catch(e){}
  
  // Method 1: ResponsiveVoice (best for WebView)
  if(window.responsiveVoice&&responsiveVoice.voiceSupport()){
    try{
      responsiveVoice.speak(t,"US English Female",{rate:r,pitch:1,volume:1});
      return;
    }catch(e){}
  }
  // Method 2: speechSynthesis (works in Chrome)
  if(window.speechSynthesis){
    try{
      var u=new SpeechSynthesisUtterance(t);
      u.lang='en-US';u.rate=r;u.volume=1;u.pitch=1;
      speechSynthesis.speak(u);
      return;
    }catch(e){}
  }
}
function saySlow(t){say(t,0.65);}
function stopAudio(){
  try{if(window.responsiveVoice)responsiveVoice.cancel();}catch(e){}
  try{if(window.speechSynthesis)speechSynthesis.cancel();}catch(e){}
}

// ═══════ SPEECH RECOGNITION ═══════
var recognition=null,isRecording=false;
function initSR(){var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return false;recognition=new SR();recognition.lang='en-US';recognition.continuous=false;recognition.interimResults=false;return true;}
function startRec(cb){if(isRecording)return;if(!recognition&&!initSR()){cb(null,'Navegador não suporta');return;}recognition.onresult=function(e){var t=e.results[0][0].transcript;var c=e.results[0][0].confidence;cb(t,null,c);};recognition.onerror=function(e){isRecording=false;cb(null,e.error)};recognition.onend=function(){isRecording=false;render()};isRecording=true;try{recognition.start()}catch(e){isRecording=false;cb(null,'Erro ao iniciar mic');return;}render();}

var audioCtx=null;
function getAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}return audioCtx;}
function playTone(freq,dur,type){var ctx=getAudio();if(!ctx)return;var o=ctx.createOscillator();var g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=type||'sine';o.frequency.value=freq;g.gain.value=0.15;o.start();g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+(dur||0.2));o.stop(ctx.currentTime+(dur||0.2));}
function sfxCorrect(){playTone(523,.1);setTimeout(function(){playTone(659,.1)},100);setTimeout(function(){playTone(784,.15)},200);}
function sfxWrong(){playTone(200,.15,'square');setTimeout(function(){playTone(150,.2,'square')},150);}
function sfxLevelUp(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){playTone(f,.15)},i*120)});}
function sfxClick(){playTone(800,.05);}
function sfxComplete(){[784,988,1175].forEach(function(f,i){setTimeout(function(){playTone(f,.12)},i*100)});}
